# .github/workflows/playwright.yml
#
# Запускает Playwright тесты и отправляет результаты в n8n
# Триггеры: push в main, workflow_dispatch (ручной / из n8n), event из Linear

name: Playwright Tests

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Какие тесты запускать'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - orders
          - ui-modes
  repository_dispatch:
    types: [linear-trigger]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: tests
        continue-on-error: true
        run: |
          GREP=""
          if [ "${{ github.event.inputs.test_suite }}" = "smoke" ]; then
            GREP="--grep @smoke"
          elif [ "${{ github.event.inputs.test_suite }}" = "orders" ]; then
            GREP="--grep @orders"
          elif [ "${{ github.event.inputs.test_suite }}" = "ui-modes" ]; then
            GREP="--grep @ui-modes"
          fi
          
          npx playwright test $GREP --reporter=json > test-results.json 2>&1 || true

      - name: Send results to n8n
        if: always()
        run: |
          # Формируем payload для n8n webhook
          RESULTS=$(cat test-results.json 2>/dev/null || echo '{"stats":{"total":0,"passed":0,"failures":0,"duration":0},"failures":[]}')
          
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"trigger\": \"github-actions\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": $(echo '${{ github.event.head_commit.message }}' | head -1 | jq -Rs .),
              \"suite\": \"${{ github.event.inputs.test_suite || 'all' }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"stats\": $(echo $RESULTS | jq '.stats // {"total":0,"passed":0,"failures":0,"duration":0}'),
              \"failures\": $(echo $RESULTS | jq '[.suites[]?.specs[]? | select(.ok == false) | {title: .title, file: .file, error: .tests[0]?.results[0]?.error?.message}][:10]')
            }"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
